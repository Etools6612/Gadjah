<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gadjah Panel</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#ff2a8a,#7b1fa2,#0d1b5e);
    color:white;
}

/* SIDEBAR */
.sidebar{
    position:fixed;
    left:0;
    top:0;
    height:100%;
    width:150px;
    background:rgba(0,0,0,0.35);
    backdrop-filter: blur(10px);
    display:flex;
    flex-direction:column;
    align-items:center;
    padding-top:120px;
    gap:50px;
}

.menu-item{
    display:flex;
    flex-direction:column;
    align-items:center;
    cursor:pointer;
    transition:0.3s;
}

.menu-item img{
    width:70px;
    height:70px;
    border-radius:18px;
    padding:12px;
    background:rgba(255,255,255,0.15);
    transition:0.3s;
}

.menu-item span{
    margin-top:10px;
    font-size:14px;
}

.menu-item.active img{
    background:linear-gradient(45deg,#ff00cc,#00ffff);
    box-shadow:0 0 20px #ff00cc;
    transform:scale(1.1);
}

/* HEADER */
.header{
    margin-left:180px;
    padding:30px;
    display:flex;
    align-items:center;
    gap:15px;
}

.logo{
    width:75px;
    height:75px;
    background:white;
    border-radius:20px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:bold;
    color:#7b1fa2;
    font-size:30px;
}

.title{
    font-size:34px;
    font-weight:bold;
}

/* CONTENT */
.content{
    margin-left:180px;
    padding:20px 30px;
}

/* ANIMATED BORDER */
.animated-border{
    position:relative;
    border-radius:20px;
    z-index:0;
}

.animated-border::before{
    content:"";
    position:absolute;
    inset:-2px;
    border-radius:22px;
    padding:2px;
    background:linear-gradient(45deg,#ff00cc,#3333ff,#00ffff,#ffcc00,#ff00cc);
    background-size:400% 400%;
    animation:borderMove 6s linear infinite;
    -webkit-mask:
        linear-gradient(#000 0 0) content-box,
        linear-gradient(#000 0 0);
    -webkit-mask-composite: xor;
            mask-composite: exclude;
    z-index:-1;
}

@keyframes borderMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

/* DISPLAY BOX */
.display-box{
    background:rgba(0,0,0,0.6);
    backdrop-filter: blur(15px);
    padding:30px;
    border-radius:20px;
    max-width:600px;
    min-height:300px;
}

.price{
    margin:10px 0;
}

/* BUTTON */
.order-btn{
    margin-top:20px;
    padding:12px 20px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
    background:linear-gradient(45deg,#ff00cc,#00ffff);
    color:white;
    transition:0.3s;
}

.order-btn:hover{
    transform:scale(1.05);
    box-shadow:0 0 15px #00ffff;
}

/* CONTACT */
.contact{
    margin-top:40px;
    background:rgba(0,0,0,0.5);
    padding:25px;
    border-radius:20px;
    max-width:600px;
}

.contact-item{
    display:flex;
    align-items:center;
    gap:12px;
    margin:10px 0;
    padding:10px;
    border-radius:12px;
    background:rgba(255,255,255,0.05);
    cursor:pointer;
    transition:0.3s;
}

.contact-item:hover{
    background:rgba(255,255,255,0.15);
}

.contact-item img{
    width:25px;
}
</style>
</head>
<body>

<div class="sidebar">

    <div class="menu-item active" onclick="showService('fb',this)">
        <img src="https://upload.wikimedia.org/wikipedia/commons/5/51/Facebook_f_logo_%282019%29.svg">
        <span>FACEBOOK</span>
    </div>

    <div class="menu-item" onclick="showService('ig',this)">
        <img src="https://upload.wikimedia.org/wikipedia/commons/a/a5/Instagram_icon.png">
        <span>INSTAGRAM</span>
    </div>

    <div class="menu-item" onclick="showService('tt',this)">
        <img src="https://upload.wikimedia.org/wikipedia/commons/0/09/TikTok_logo.svg" style="filter:brightness(0) invert(1);">
        <span>TIKTOK</span>
    </div>

</div>

<div class="header">
    <div class="logo">G</div>
    <div class="title">Gadjah</div>
</div>

<div class="content">

    <div class="display-box animated-border" id="serviceBox"></div>

    <div class="contact animated-border">
        <h3>Contact Details</h3>

        <div class="contact-item" onclick="window.open('https://t.me/shinthebooster')">
            <img src="https://upload.wikimedia.org/wikipedia/commons/8/82/Telegram_logo.svg">
            Telegram: @shinthebooster
        </div>

        <div class="contact-item" onclick="window.open('https://wa.me/639564900947')">
            <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg">
            WhatsApp: 09564900947
        </div>

        <div class="contact-item" onclick="window.open('https://www.facebook.com/profile.php?id=61584963890912')">
            <img src="https://upload.wikimedia.org/wikipedia/commons/5/51/Facebook_f_logo_%282019%29.svg">
            Main Facebook
        </div>

        <div class="contact-item" onclick="window.open('https://www.facebook.com/profile.php?id=61586301187510')">
            <img src="https://upload.wikimedia.org/wikipedia/commons/5/51/Facebook_f_logo_%282019%29.svg">
            Backup Facebook
        </div>

    </div>

</div>

<script>
function showService(type, element){

    document.querySelectorAll('.menu-item').forEach(item=>{
        item.classList.remove('active');
    });

    element.classList.add('active');

    const box = document.getElementById("serviceBox");

    if(type === "fb"){
        box.innerHTML = `
        <h2>Facebook Boost Limited</h2>
        <div class="price">₱15 – 1k followers</div>
        <div class="price">₱150 – 10k followers</div>
        <div class="price">₱250 – 20k followers</div>
        <div class="price">₱500 – 45k followers</div>
        <button class="order-btn" onclick="window.open('https://t.me/shinthebooster')">
            Order via Telegram
        </button>
        `;
    }

    if(type === "ig"){
        box.innerHTML = `
        <h2>Instagram Boost</h2>
        <div class="price">₱20 – 1k followers</div>
        <div class="price">₱180 – 10k followers</div>
        <button class="order-btn" onclick="window.open('https://t.me/shinthebooster')">
            Order via Telegram
        </button>
        `;
    }

    if(type === "tt"){
        box.innerHTML = `
        <h2>TikTok Boost</h2>
        <div class="price">₱25 – 1k followers</div>
        <div class="price">₱200 – 10k followers</div>
        <button class="order-btn" onclick="window.open('https://t.me/shinthebooster')">
            Order via Telegram
        </button>
        `;
    }
}

// Default load
showService('fb', document.querySelector('.menu-item'));
</script>

</body>
</html>
